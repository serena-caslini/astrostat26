name: Update Calendar

permissions:
  contents: write
  
on:
  schedule:
    - cron: "0 6 * * *"   # run daily at 06:00 UTC
  workflow_dispatch:       # still allow manual runs, but no inputs

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ics tatsu python-dateutil requests

      - name: Update README with calendar
        run: |
          python utils/update_calendar.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update calendar" || echo "No changes"
          git push
